services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pulseguard
      POSTGRES_USER: pulseguard
      POSTGRES_PASSWORD: pulseguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://db:5432/pulseguard
      DB_USERNAME: pulseguard
      DB_PASSWORD: pulseguard
      # Generate your own 256-bit base64 secret for real use:
      #   openssl rand -base64 32
      JWT_SECRET: c2VjdXJlLWRldi1vbmx5LXNlY3JldC1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbg==
    ports:
      - "8080:8080"

volumes:
  pgdata:
