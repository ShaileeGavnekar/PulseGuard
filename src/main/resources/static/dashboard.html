<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseGuard Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root { --green:#6DB33F; --slate:#33475B; --bg:#f5f7f9; --up:#2e9e4f; --down:#d64545; --unknown:#9aa5b1; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:#1a1a1a; }
    header { background:var(--green); color:#fff; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; }
    header h1 { margin:0; font-size:22px; font-weight:700; }
    header .sub { font-size:13px; opacity:.9; }
    main { max-width:1100px; margin:0 auto; padding:24px; }
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); padding:20px; margin-bottom:20px; }
    .login { max-width:380px; margin:60px auto; }
    .login h2 { margin-top:0; color:var(--slate); }
    label { display:block; font-size:13px; color:var(--slate); margin:12px 0 4px; }
    input { width:100%; padding:10px 12px; border:1px solid #d5dbe0; border-radius:8px; font-size:14px; }
    button { background:var(--green); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
    button:hover { filter:brightness(.95); }
    button.secondary { background:#fff; color:var(--slate); border:1px solid #d5dbe0; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .monitor { border:1px solid #eef1f4; border-radius:10px; padding:16px; }
    .monitor .name { font-weight:700; font-size:16px; }
    .monitor .url { font-size:12px; color:#6b7785; word-break:break-all; margin:2px 0 10px; }
    .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; color:#fff; }
    .badge.UP{background:var(--up)} .badge.DOWN{background:var(--down)} .badge.UNKNOWN{background:var(--unknown)}
    .stat { font-size:13px; color:#4a5568; margin-top:8px; }
    .hidden { display:none; }
    .err { color:var(--down); font-size:13px; margin-top:10px; }
    .muted { color:#8a94a0; font-size:13px; }
    .pill { font-size:12px; background:#eef6e7; color:#3f6b25; padding:3px 8px; border-radius:6px; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🛰️ PulseGuard</h1>
    <div class="sub">Uptime dashboard</div>
  </div>
  <div id="userbar" class="hidden row">
    <span id="who" class="sub"></span>
    <button class="secondary" onclick="logout()">Log out</button>
  </div>
</header>

<main>
  <!-- Login -->
  <div id="loginCard" class="card login">
    <h2>Sign in</h2>
    <p class="muted">Demo account is pre-filled — just click Sign in.</p>
    <label>Email</label>
    <input id="email" value="demo@pulseguard.dev"/>
    <label>Password</label>
    <input id="password" type="password" value="password123"/>
    <div style="margin-top:16px;"><button onclick="login()">Sign in</button></div>
    <div id="loginErr" class="err"></div>
  </div>

  <!-- Dashboard -->
  <div id="dash" class="hidden">
    <div class="row" style="justify-content:space-between; margin-bottom:16px;">
      <h2 style="margin:0; color:var(--slate);">Your monitors</h2>
      <button class="secondary" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="card">
      <canvas id="chart" height="110"></canvas>
    </div>
    <div id="cards" class="grid"></div>
    <p id="empty" class="muted hidden">No monitors yet. Create one via the API or Swagger UI.</p>
  </div>
</main>

<script>
  let token = null;
  let chart = null;

  async function login() {
    document.getElementById('loginErr').textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) { throw new Error('Login failed (' + res.status + ')'); }
      const data = await res.json();
      token = data.token;
      document.getElementById('who').textContent = email;
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('dash').classList.remove('hidden');
      document.getElementById('userbar').classList.remove('hidden');
      loadData();
    } catch (e) {
      document.getElementById('loginErr').textContent = e.message;
    }
  }

  function logout() {
    token = null;
    document.getElementById('dash').classList.add('hidden');
    document.getElementById('userbar').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
  }

  function authHeaders() { return { 'Authorization': 'Bearer ' + token }; }

  async function loadData() {
    const res = await fetch('/api/monitors?size=100', { headers: authHeaders() });
    if (!res.ok) { logout(); return; }
    const page = await res.json();
    const monitors = page.content || [];
    document.getElementById('empty').classList.toggle('hidden', monitors.length > 0);

    // Fetch stats for each monitor in parallel
    const stats = await Promise.all(monitors.map(m =>
      fetch('/api/monitors/' + m.id + '/stats', { headers: authHeaders() })
        .then(r => r.ok ? r.json() : { uptimePercentage: 0, totalChecks: 0 })
    ));

    renderCards(monitors, stats);
    renderChart(monitors, stats);
  }

  function renderCards(monitors, stats) {
    const el = document.getElementById('cards');
    el.innerHTML = '';
    monitors.forEach((m, i) => {
      const s = stats[i];
      const last = m.lastCheckedAt ? new Date(m.lastCheckedAt).toLocaleTimeString() : 'never';
      el.innerHTML += `
        <div class="monitor">
          <div class="row" style="justify-content:space-between;">
            <span class="name">${escapeHtml(m.name)}</span>
            <span class="badge ${m.lastStatus}">${m.lastStatus}</span>
          </div>
          <div class="url">${escapeHtml(m.url)}</div>
          <div><span class="pill">${s.uptimePercentage}% uptime</span></div>
          <div class="stat">${s.totalChecks} checks · last: ${last}</div>
        </div>`;
    });
  }

  function renderChart(monitors, stats) {
    const labels = monitors.map(m => m.name);
    const data = stats.map(s => s.uptimePercentage);
    const colors = monitors.map(m => m.lastStatus === 'DOWN' ? '#d64545' : '#6DB33F');
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Uptime %', data, backgroundColor: colors, borderRadius: 6 }] },
      options: {
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
        plugins: { legend: { display: false }, title: { display: true, text: 'Uptime by monitor' } }
      }
    });
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
</script>
</body>
</html>
